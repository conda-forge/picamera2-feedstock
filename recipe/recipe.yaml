context:
  version: "0.3.35"

package:
  name: picamera2
  version: ${{ version }}

source:
  - url: https://pypi.org/packages/source/p/picamera2/picamera2-${{ version }}.tar.gz
    sha256: c34b36e8cce0f64a7b5a380db2d6a81a5d70dcacb07a9d3572510f6f2bc0911f

build:
  number: 0
  script: ${{ PYTHON }} -m pip install .
  noarch: python

requirements:
  host:
    - python ${{ python_min }}.*
    - pip
    - setuptools
  run:
    - python >=${{ python_min }}
    - libcamera
    - pidng
    - av
    - jsonschema
    - pykms
    - python-libarchive-c
    - numpy
    - piexif
    - pillow
    - python-prctl
    - simplejpeg
    - tqdm
    - py-videodev2
    - openexr-python
    - __linux

tests:
  - python:
      imports:
        - picamera2
      pip_check: false
      python_version:
        - ${{ python_min }}.*
        - "*"
  - script: run_test.py
    requirements:
      run:
        - python ${{ python_min }}.*

about:
  homepage: https://github.com/RaspberryPi/picamera2
  summary: The libcamera-based Python interface to Raspberry Pi cameras, based on the original Picamera library
  license: BSD-2-Clause
  license_file: LICENSE

extra:
  recipe-maintainers:
    - carlodri
